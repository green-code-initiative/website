version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "@types/node"
      - dependency-name: "@unhead/vue"
        # vite-ssg does not support unhead v3, see https://github.com/antfu-collective/vite-ssg/issues/469
        versions: [">=3"]
      - dependency-name: "typescript"
        # typescript v7 is not supported by typescript-eslint v8, see https://github.com/typescript-eslint/typescript-eslint/issues/10940
        versions: [">=7"]
    groups:
      all-dependencies:
        patterns:
          - "*"
